<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            color:white;
            font-family:Arial;
        }

        .navbar{
            display:flex;
            justify-content:center;
            gap:60px;
            padding:22px;

            position:sticky;
            top:0;

            background:rgba(0,0,0,0.45);
            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,165,0,0.15);
        }

        .navbar a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;

            transition:0.3s;

            padding:10px 18px;
            border-radius:12px;

            display:inline-block;
        }

        .navbar a:hover{
            color:orange;
            background:rgba(255,165,0,0.08);
            box-shadow:0px 0px 20px rgba(255,165,0,0.4);
            transform:translateY(-3px);
        }

        .content{
            text-align:center;
            padding:120px 50px;
        }

        h1{
            font-size:72px;
            color:orange;
        }

        p{
            font-size:22px;
            color:#cccccc;
        }
@media(max-width:768px){

    .navbar{
        gap:25px;
        padding:18px;
    }

    .navbar a{
        font-size:15px;
    }

    h1{
        font-size:48px !important;
    }

    p{
        font-size:15px !important;
        line-height:1.6;
    }

    .hero{
        padding:120px 20px;
        text-align:center;
    }

    .hero img{
        width:180px !important;
    }

    .content{
        width:90% !important;
    }

    iframe{
        width:90% !important;
        height:250px !important;
    }

}
    </style>

</head>

<body>

    <div class="navbar">

        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="catalog.html">Catalog</a>
        <a href="contact.html">Contact</a>

    </div>

    <div class="content">

        <h1>CONTACT US</h1>

        <p>WhatsApp: +60 XX-XXXX XXX</p>

    </div>

</body>

</html>
