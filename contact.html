position:sticky;

">

<a href="index.html" style="text-decoration:none; color:white;">
<p style="

"
onmouseover="this.style.color='orange'"

</p>

<a href="about.html" style="text-decoration:none; color:white;">
<p style="

<a href="catalog.html" style="text-decoration:none; color:white;">

<a href="contact.html" style="text-decoration:none; color:orange;">
<p style="

">

</div>

<!-- MAIN CONTACT SECTION -->
<div style="
display:flex;
justify-content:center;
align-items:center;
height:85vh;
">

<div style="
width:900px;
background-color:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
border-radius:25px;
padding:50px;
box-shadow:0px 0px 30px rgba(255,140,0,0.4);
display:flex;
gap:50px;
">

<!-- LEFT SIDE -->
<div style="flex:1;">

<h1 style="
font-size:55px;
margin-bottom:10px;
color:orange;
letter-spacing:3px;
">
CONTACT US
</h1>

<p style="
font-size:18px;
line-height:35px;
color:#dddddd;
">
We are ready to support your business with reliable heavy-duty spare parts solutions across Malaysia.
</p>

<div style="margin-top:40px;">

<p style="font-size:20px;">
📍 Malaysia
</p>

<p style="font-size:20px;">
📞 +60 16-712 3232
</p>

<p style="font-size:20px;">
📧 mavenuesales@gmail.com
</p>

<p style="font-size:20px;">
🕒 Mon - Sat | 9AM - 6PM
</p>

</div>

</div>

<!-- RIGHT SIDE -->
<div style="
flex:1;
display:flex;
flex-direction:column;
gap:20px;
">

<input type="text" placeholder="Your Name"
style="
padding:18px;
border:none;
border-radius:12px;
font-size:16px;
background-color:rgba(255,255,255,0.1);
color:white;
outline:none;
">

<input type="email" placeholder="Your Email"
style="
padding:18px;
border:none;
border-radius:12px;
font-size:16px;
background-color:rgba(255,255,255,0.1);
color:white;
outline:none;
">

<textarea placeholder="Your Message"
style="
height:180px;
padding:18px;
border:none;
border-radius:12px;
font-size:16px;
background-color:rgba(255,255,255,0.1);
color:white;
outline:none;
resize:none;
"></textarea>

<button style="
padding:18px;
font-size:18px;
font-weight:bold;
background:linear-gradient(45deg, orange, red);
border:none;
border-radius:12px;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0px 0px 20px rgba(255,140,0,0.5);
"
onmouseover="
this.style.transform='scale(1.03)';
this.style.boxShadow='0px 0px 35px orange';
"
onmouseout="
this.style.transform='scale(1)';
this.style.boxShadow='0px 0px 20px rgba(255,140,0,0.5)';
">
SEND MESSAGE
</button>

</div>

</div>

</div>
