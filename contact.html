    <style>

        body{

   .navbar{
            position:relative;
z-index:5;
        display:flex;
            justify-content:center;
            gap: 60px;px;
            padding:22px;

            position:sticky;
            top:0;

            background:rgba(0,0,0,0.45);

            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,165,0,0.15);

            z-index:999;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;

            transition:0.3s;

            padding:10px 18px;
            border-radius:12px;

            display:inline-block;
        }

        .navbar a:hover{
            color:orange;

            background:rgba(255,165,0,0.08);

            box-shadow:0px 0px 20px rgba(255,165,0,0.4);

            transform:translateY(-3px);
        }
        

        .content{
            text-align:center;
            padding:120px 50px;
        }

        h1{
            font-size:72px;
            color:orange;
        }

        p{
            font-size:22px;
            color:#cccccc;
        }

        .contact-hero::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:rgba(255,140,0,0.08);

filter:blur(120px);

border-radius:50%;

z-index:-1;
}
@media(max-width:768px){

    .navbar{
        gap:25px;
        padding:18px;
    }

    .navbar a{
        font-size:15px;
    }

    h1{
        font-size:48px !important;
    }

    p{
        font-size:15px !important;
        line-height:1.6;
    }

    .hero{
        padding:120px 20px;
        text-align:center;
    }

    .hero img{
        width:180px !important;
    }

    .content{
        width:90% !important;
    }

    iframe{
        width:90% !important;
        height:250px !important;
    }

     }
.contact-hero{

    min-height:55vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:40px 20px;
}

.contact-hero h1{

    font-size:90px;

    line-height:0.9;

    color:white;

    margin-bottom:25px;
}

.contact-hero p{

    max-width:700px;

    font-size:20px;

    color:#d0d0d0;
}

.contact-container{

    width:90%;

    max-width:1200px;

    margin:auto;

    display:flex;

    gap:30px;

    justify-content:center;

    flex-wrap:wrap;

    padding-bottom:80px;
}

.contact-card{

    flex:1;

    min-width:260px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,165,0,0.15);

    border-radius:25px;

    padding:40px;

    text-align:center;

    backdrop-filter:blur(10px);

    transition:0.4s;
}

.contact-card:hover{

    transform:translateY(-10px);

    box-shadow:0 0 35px rgba(255,140,0,0.2);
}

.contact-card h2{

    color:orange;

    margin-bottom:20px;
}

.contact-card p{

    color:#d6d6d6;

    line-height:1.8;
}

.contact-card a{

    display:inline-block;

    margin-top:20px;

    padding:16px 30px;

    background:orange;

    color:black;

    text-decoration:none;

    border-radius:12px;

    font-weight:bold;

    transition:0.3s;
}

.contact-card a:hover{

    background:white;
}

.map-section{

    width:90%;

    max-width:1200px;

    margin:80px auto;
}

.map-section iframe{

    border-radius:30px;
}

}
