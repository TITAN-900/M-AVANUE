<!DOCTYPE html>
<html>
<head>
<title>SPRING</title>
<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}
.navbar{
    position:relative;
    z-index:5;
    display:flex;
    justify-content:center;
    gap:60px;
    padding:22px;
    position:sticky;
    top:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,165,0,0.15);
    z-index:999;
}
.navbar a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
    padding:10px 18px;
    border-radius:12px;
    display:inline-block;
}
.navbar a:hover{
    color:orange;
    background:rgba(255,165,0,0.08);
    box-shadow:0px 0px 20px rgba(255,165,0,0.4);
    transform:translateY(-3px);
}
.search-box{
    text-align:center;
    margin-top:40px;
}
.search-box input{
    width:320px;
    padding:16px 22px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:18px;
    outline:none;
    border:1px solid rgba(255,165,0,0.18);
}
.product-grid{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    justify-content:center;
    padding:60px 40px;
}
.product-box{
    width:260px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,165,0,0.15);
    border-radius:22px;
    padding:20px;
    text-align:center;
    transition:0.4s;
    backdrop-filter:blur(10px);
}
.product-box:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px rgba(255,165,0,0.25);
}
.product-box img{
    width:100%;
    height:220px;
    object-fit:contain;
    border-radius:15px;
    background:white;
}
.product-box h2{
    color:orange;
    margin-top:20px;
}
.product-box p{
    color:#d6d6d6;
    font-size:15px;
}
.popup{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.popup-img{
    max-width:85%;
    max-height:85%;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,165,0,0.35);
}
.close{
    position:absolute;
    top:30px;
    right:40px;
    color:white;
    font-size:45px;
    cursor:pointer;
}
@media(max-width:768px){
.navbar{
    gap:25px;
    padding:18px;
}
.navbar a{
    font-size:15px;
}
}
</style>
</head>
<body>
<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="catalog.html">Catalog</a>
    <a href="contact.html">Contact</a>
</div>
<div class="search-box">
<input type="text"
placeholder="Search Spring...">
</div>
<div class="product-grid">
<div class="product-box">
<img 
src="cbs17002.png"
alt="Greatshield CBS17002 Spring Malaysia"
onclick="openPopup(this.src)">
<h2>CBS-17002</h2>
<p>
CLUTCH SPRING 7"
</p>
</div>
<div class="product-box">
<img 
src="9827-03117.png.jpg"
alt="Greatshield 9827-03117 Spring Malaysia"
onclick="openPopup(this.src)">
<h2>9827-03117</h2>
<p>
TOP C/PUMP SPRING
</p>
</div>
<div class="product-box">
<img 
src="t30-85604.png.jpg"
alt="Greatshield T30-85604 Spring Malaysia"
onclick="openPopup(this.src)">
<h2>T30-85604</h2>
<p>
T24 T30 CHAMBER PUMP SPRING
</p>
</div>

<div class="product-box">
<img 
src="cbs16002.jpg.jpg"
alt="Greatshield CBS16002 Clutch Spring Malaysia"
onclick="openPopup(this.src)">
<h2>CBS-16002</h2>
<p>
CLUTCH SPRING 6"
</p>
</div>
</div>
<div id="popup" class="popup">
<span class="close">&times;</span>
<img class="popup-img" id="popup-img">
</div>
<script>
function openPopup(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=src;
}
document.querySelector(".close").onclick=function(){
document.getElementById("popup").style.display="none";
}
</script>
</body>
</html>
