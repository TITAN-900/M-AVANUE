<!DOCTYPE html>
<html>

<head>
    <title>M AVANUE</title>

    <style>

        body{
            margin:0;
            color:white;
            font-family:Arial;
            overflow-x:hidden;
        }

        .bg-video{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-1;
}
.video-overlay{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.55);

    z-index:-1;
}
        /* NAVBAR */

        .navbar{
            position:relative;
z-index:5;
            display:flex;
            justify-content:center;
            gap:60px;

            padding:22px;

            position:sticky;
            top:0;

            background:rgba(0,0,0,0.45);

            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,165,0,0.15);

            z-index:999;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;

            transition:0.3s;

            padding:10px 18px;
            border-radius:12px;

            display:inline-block;
        }

        .navbar a:hover{
            color:orange;

            background:rgba(255,165,0,0.08);

            box-shadow:0px 0px 20px rgba(255,165,0,0.4);

            transform:translateY(-3px);
        }
.logo-area{
    position:absolute;
    left:40px;
    top:18px;
}

.logo-text{
    font-size:28px;

    font-weight:900;

    font-family:Arial Black, sans-serif;

    letter-spacing:4px;

    text-transform:uppercase;

    background:linear-gradient(
    90deg,
    #dc0808,
    #ff4d4d,
    #b30000

    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0px 0px 10px rgba(255,140,0,0.45),
    0px 0px 25px rgba(255,140,0,0.2);

    transition:0.3s;
}

.logo-text:hover{
    transform:scale(1.05);

    filter:brightness(1.2);
}

.logo-sub{
    margin-top:-2px;

    font-size:10px;

    letter-spacing:5px;

    color:#cccccc;
}
        /* HERO */

        .hero{
            position:relative;
z-index:5;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:80px;

            padding:0px 60px 100px;
            min-height:70vh;
        }

        .hero img{
            width:400px;
            border-radius:25px;

            box-shadow:0px 0px 35px rgba(255,140,0,0.45);
        }

.hero-text h1{

font-size:72px;

font-weight:900;

letter-spacing:4px;

text-transform:uppercase;

background:linear-gradient(
90deg,
#ffffff,
#ffae00,
#ffffff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(255,165,0,0.35),
0 0 30px rgba(255,140,0,0.25);

margin-bottom:10px;


        }

        .hero-text h2{

font-size:34px;

font-weight:800;

letter-spacing:3px;

color:#ffffff;

text-transform:uppercase;

text-shadow:
0 0 12px rgba(255,165,0,0.4);

margin-bottom:20px;


        }

        .hero-text p{

font-size:18px;

line-height:1.8;

color:#e0e0e0;

letter-spacing:1px;


        }

        button{
            margin-top:35px;

            background:orange;
            color:black;

            border:none;

            padding:18px 38px;

            border-radius:14px;

            font-size:18px;
            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            box-shadow:0px 0px 20px rgba(255,165,0,0.45);
        }

        button:hover{
            transform:translateY(-5px);

            box-shadow:0px 0px 35px orange;
        }
@media(max-width:768px){

    .navbar{
        gap:25px;
        padding:18px;
    }

    .navbar a{
        font-size:15px;
    }

    h1{
        font-size:48px !important;
    }

    p{
        font-size:15px !important;
        line-height:1.6;
    }

    .hero{
        padding:40px 60px 100px;
        min-height:70vh;
        text-align:center;
    }

    .hero img{
        width:180px !important;
    }

    .content{
        width:90% !important;
    }

    iframe{
        width:90% !important;
        height:250px !important;
    }

}
.hero-text{
animation:fadeUp 1.5s ease;

background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);

padding:35px;

border-radius:25px;

border:1px solid rgba(255,165,0,0.25);

box-shadow:0 0 40px rgba(255,140,0,0.18);

position:relative;

overflow:hidden;

isolation:isolate;
}
.hero-text::before{

content:"";

position:absolute;

top:0;
left:-150%;

width:80%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,165,0,0.18),
transparent
);

transform:skewX(-25deg);

animation:shine 4s infinite;

z-index:-1;

}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}
@keyframes shine{

0%{
left:-150%;
}

100%{
left:180%;
}

}
    </style>

</head>

<body>

    <video autoplay muted loop playsinline class="bg-video">
    <source src="truck.mp4.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>
    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo-area">
    <div class="logo-text">M AVANUE</div>
    <div class="logo-sub">SPARE PART SUPPLY</div>
</div>

        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="catalog.html">Catalog</a>
        <a href="contact.html">Contact</a>

    </div>

    <!-- HERO SECTION -->

    <div class="hero">

        <img src="logo2.jpg.jpeg">

        <div class="hero-text">

            <h1>M AVANUE</h1>

            <h2>TRUSTED SPARE PART SOLUTION</h2>

            <p>
                Professional heavy-duty spare part supplier focused on quality,
                reliability and long-term trusted partnership across Malaysia.
            </p>


        </div>

    </div>

</body>

</html>
