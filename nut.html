<!DOCTYPE html>
<html>
<head>
<title>LOCK NUT & REDUCING BUSH</title>
<meta name="format-detection" content="telephone=no">
<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}
.navbar{
    position:relative;
    z-index:5;
    display:flex;
    justify-content:center;
    gap:60px;
    padding:22px;
    position:sticky;
    top:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,165,0,0.15);
}
.navbar a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
    padding:10px 18px;
    border-radius:12px;
}
.navbar a:hover{
    color:orange;
    background:rgba(255,165,0,0.08);
    box-shadow:0 0 20px rgba(255,165,0,0.4);
    transform:translateY(-3px);
}
.search-box{
    text-align:center;
    margin-top:40px;
}
.search-box input{
    width:320px;
    padding:16px 22px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:18px;
    outline:none;
    border:1px solid rgba(255,165,0,0.18);
}
.product-grid{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    justify-content:center;
    padding:60px 40px;
}
.product-box{
    width:260px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,165,0,0.15);
    border-radius:22px;
    padding:20px;
    text-align:center;
    transition:0.4s;
    backdrop-filter:blur(10px);
}
.product-box:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px rgba(255,165,0,0.25);
}
.product-box img{
    width:100%;
    height:220px;
    object-fit:contain;
    border-radius:15px;
    background:white;
}
.product-box h2{
    color:orange;
    margin-top:20px;
}
.product-box p{
    color:#d6d6d6;
    font-size:15px;
}
.popup{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.popup-img{
    max-width:85%;
    max-height:85%;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,165,0,0.35);
}
.close{
    position:absolute;
    top:30px;
    right:40px;
    color:white;
    font-size:45px;
    cursor:pointer;
}
@media(max-width:768px){
.navbar{
    gap:25px;
    padding:18px;
}
.navbar a{
    font-size:15px;
}
}
</style>
</head>
<body>
<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="catalog.html">Catalog</a>
<a href="contact.html">Contact</a>
</div>
<div class="search-box">
<input type="text"
placeholder="Search Product...">
</div>
<div class="product-grid">
<!-- PRODUCT START -->
<div class="product-box">

<img 
src="re467202100.jpg.jpg"

alt="Lock Nut RE4-67202-100 Truck Part Malaysia"

onclick="openPopup(this.src)">

<h2>RE4-67202-100</h2>

<p>
1/2 LOCK NUT
</p>

</div>


<div class="product-box">

<img 
src="rcb38xm2215.jpg.jpg"

alt="Reducing Bush RCB-38XM2215 Truck Part Malaysia"

onclick="openPopup(this.src)">

<h2>RCB-38XM2215</h2>

<p>
3/8 BSP x M22X1.5 REDUCING BUSH
</p>

</div>


<div class="product-box">

<img 
src="rcb38xm1815.jpg.jpg"

alt="Reducing Bush RCB-38XM1815 Truck Part Malaysia"

onclick="openPopup(this.src)">

<h2>RCB-38XM1815</h2>

<p>
3/8 BSP x M18X1.5 REDUCING BUSH
</p>

</div>

<div class="product-box">

<img 
src="re467203.jpg.jpg"

alt="Lock Nut RE4-67203 Truck Part Malaysia"

onclick="openPopup(this.src)">

<h2>RE4-67203</h2>

<p>
1/2 LOCK NUT
</p>

</div>


<div class="product-box">

<img 
src="rcbm16xm1415.jpg.jpg"

alt="Reducing Bush RCB-M16XM1415 Truck Part Malaysia"

onclick="openPopup(this.src)">

<h2>RCB-M16XM1415</h2>

<p>
3/8 BSP x M18X1.5 REDUCING BUSH
</p>

</div>

<!-- PRODUCT END -->
</div>
<div id="popup" class="popup">
<span class="close">&times;</span>
<img class="popup-img" id="popup-img">
</div>
<script>
function openPopup(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=src;
}
document.querySelector(".close").onclick=function(){
document.getElementById("popup").style.display="none";
}
</script>
</body>
</html>
