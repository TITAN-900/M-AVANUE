<!DOCTYPE html>
<html>

<head>
    <title>Catalog</title>

   <style>

        body{
            margin:0;
            background:#0f0f0f;
            color:white;
            font-family:Arial;
        }

        .navbar{
            display:flex;
            justify-content:center;
            gap:60px;
            padding:22px;

            position:sticky;
            top:0;

            background:rgba(0,0,0,0.45);
            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,165,0,0.15);
        }

        .navbar a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;

            transition:0.3s;

            padding:10px 18px;
            border-radius:12px;

            display:inline-block;
        }

        .navbar a:hover{
            color:orange;
            background:rgba(255,165,0,0.08);
            box-shadow:0px 0px 20px rgba(255,165,0,0.4);
            transform:translateY(-3px);
        }

        .content{
            text-align:center;
            padding:120px 50px;
        }

        h1{
            font-size:72px;
            color:orange;
        }

        p{
            font-size:22px;
            color:#cccccc;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="catalog.html">Catalog</a>

    </div>

    <div class="content">

    </div>

</body>

</html>
